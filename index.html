<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble Game</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <main>
        <section id="game-container">
            <h1>Word Scramble Game</h1>
            <p>Try to guess the word!</p>
            
            <h2 id="scrambled-word">flyfu</h2>
            
            <input type="text" id="user-guess" placeholder="Enter your guess">
            <br><br>
            
            <div class="button-group">
                <button type="button" id="check-btn">Check Answer</button>
                <button type="button" id="new-word-btn">New Word</button>
            </div>

            <p id="result-text"></p>
            
            <img id="word-image" src="" alt="Word Image" style="display: none;">
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
